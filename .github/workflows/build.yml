name: build
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest, macOS-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements_dev.txt
          pip install coveralls

      - name: Run tests
        run: coverage run -m unittest discover -s tests -t tests

      - name: Run benchmark
        run: python3 -m pytest
          --benchmark-verbose
          --benchmark-columns=mean,stddev,iqr,ops,rounds
          tests/benchmarks/benchmark_model.py
          tests/benchmarks/benchmark_management_api.py
          tests/benchmarks/benchmark_role_manager.py
          tests/benchmarks/benchmark_adapter.py

      - name: Upload coverage data to coveralls.io
        run: coveralls --service=github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_FLAG_NAME: ${{ matrix.os }} - ${{ matrix.python-version }}
          COVERALLS_PARALLEL: true

  lint:
    name: Run Linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Super-Linter
        uses: super-linter/super-linter@v5.7.2
        env:
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_PYTHON_BLACK: true
          DEFAULT_BRANCH: master
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: /
          PYTHON_BLACK_CONFIG_FILE: pyproject.toml

  coveralls:
    name: Indicate completion to coveralls.io
    needs: test
    runs-on: ubuntu-latest
    container: python:3-slim
    steps:
      - name: Finished
        run: |
          pip3 install --upgrade coveralls
          coveralls --finish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prepare_dev_release:
    name: Prepare Dev Release
    runs-on: ubuntu-latest
    needs: [test, coveralls]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    outputs:
      git_tag: ${{ steps.dev.outputs.git_tag }}
      pypi_version: ${{ steps.dev.outputs.pypi_version }}
      basename: ${{ steps.dev.outputs.basename }}
      previous_tag: ${{ steps.dev.outputs.previous_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute dev version
        id: dev
        run: |
          LATEST_RELEASE_TAG="$(
            git tag --list 'v*' |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
              sort -V |
              tail -n 1
          )"

          if [ -z "${LATEST_RELEASE_TAG}" ]; then
            BASE_VERSION="0.1.0"
          else
            RELEASE_VERSION="${LATEST_RELEASE_TAG#v}"
            MAJOR="${RELEASE_VERSION%%.*}"
            REST="${RELEASE_VERSION#*.}"
            MINOR="${REST%%.*}"
            NEXT_MINOR="$((MINOR + 1))"
            BASE_VERSION="${MAJOR}.${NEXT_MINOR}.0"
          fi

          ESCAPED_BASE_VERSION="${BASE_VERSION//./\\.}"
          LAST_DEV_NUMBER="$(
            git tag --list "v${BASE_VERSION}-dev.*" |
              sed -nE "s/^v${ESCAPED_BASE_VERSION}-dev\.([0-9]+)$/\1/p" |
              sort -n |
              tail -n 1
          )"
          LAST_DEV_NUMBER="${LAST_DEV_NUMBER:-0}"
          NEXT_DEV_NUMBER="$((LAST_DEV_NUMBER + 1))"
          GIT_TAG="v${BASE_VERSION}-dev.${NEXT_DEV_NUMBER}"
          PYPI_VERSION="${BASE_VERSION}.dev${NEXT_DEV_NUMBER}"
          BASENAME="pycasbin-${PYPI_VERSION}-src"

          echo "git_tag=${GIT_TAG}" >> "${GITHUB_OUTPUT}"
          echo "pypi_version=${PYPI_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "basename=${BASENAME}" >> "${GITHUB_OUTPUT}"
          if [ "${LAST_DEV_NUMBER}" -gt 0 ]; then
            echo "previous_tag=v${BASE_VERSION}-dev.${LAST_DEV_NUMBER}" >> "${GITHUB_OUTPUT}"
          else
            echo "previous_tag=${LATEST_RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          fi

          echo "Computed git tag: ${GIT_TAG}"
          echo "Computed PyPI version: ${PYPI_VERSION}"

  publish_dev_release:
    name: Publish Dev Release
    runs-on: ubuntu-latest
    needs: prepare_dev_release
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Generate release notes
        run: |
          PREVIOUS_TAG="${{ needs.prepare_dev_release.outputs.previous_tag }}"
          CURRENT_TAG="${{ needs.prepare_dev_release.outputs.git_tag }}"
          CURRENT_VERSION="${{ needs.prepare_dev_release.outputs.pypi_version }}"
          RELEASE_DATE="$(date -u +%F)"
          RANGE="HEAD"

          if [ -n "${PREVIOUS_TAG}" ]; then
            RANGE="${PREVIOUS_TAG}..HEAD"
          fi

          FEATURES="$(git log --pretty=format:'%s (%h)' "${RANGE}" | grep -Ei '^(feat)(\(.+\))?: ' || true)"
          FIXES="$(git log --pretty=format:'%s (%h)' "${RANGE}" | grep -Ei '^(fix)(\(.+\))?: ' || true)"
          DOCS="$(git log --pretty=format:'%s (%h)' "${RANGE}" | grep -Ei '^(docs?|doc)(\(.+\))?: ' || true)"

          {
            if [ -n "${PREVIOUS_TAG}" ]; then
              echo "# [${CURRENT_VERSION}](https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}) (${RELEASE_DATE})"
            else
              echo "# ${CURRENT_VERSION} (${RELEASE_DATE})"
            fi
            echo
            echo "This release publishes the Apache development package to PyPI."
            echo

            if [ -n "${FEATURES}" ]; then
              echo "## Features"
              echo
              printf '%s\n' "${FEATURES}" | sed 's/^/- /'
              echo
            fi

            if [ -n "${FIXES}" ]; then
              echo "## Fixes"
              echo
              printf '%s\n' "${FIXES}" | sed 's/^/- /'
              echo
            fi

            if [ -n "${DOCS}" ]; then
              echo "## Docs"
              echo
              printf '%s\n' "${DOCS}" | sed 's/^/- /'
              echo
            fi

            if [ -z "${FEATURES}${FIXES}${DOCS}" ]; then
              echo "## Notes"
              echo
              echo "- No feat/fix/doc commits were found in this development release range."
            fi
          } > DEV_RELEASE_NOTES.md

      - name: Set package version
        env:
          PYPI_VERSION: ${{ needs.prepare_dev_release.outputs.pypi_version }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["PYPI_VERSION"]
          path = Path("pyproject.toml")
          content = path.read_text()
          updated, count = re.subn(
              r'^version = ".*"$',
              f'version = "{version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if count != 1:
              raise SystemExit("Failed to update version in pyproject.toml")
          path.write_text(updated)
          PY

      - name: Build distribution
        run: |
          python3 -m pip install --upgrade pip build twine
          python3 -m build --sdist
          python3 -m twine check dist/*.tar.gz

      - name: Create source archives
        run: |
          mkdir -p release-artifacts
          git archive --format=tar.gz --prefix="${{ needs.prepare_dev_release.outputs.basename }}/" -o "release-artifacts/${{ needs.prepare_dev_release.outputs.basename }}.tar.gz" HEAD
          git archive --format=zip --prefix="${{ needs.prepare_dev_release.outputs.basename }}/" -o "release-artifacts/${{ needs.prepare_dev_release.outputs.basename }}.zip" HEAD

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN_CASBIN }}
        run: python3 -m twine upload dist/pycasbin-*.tar.gz

      - name: Semantic Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_dev_release.outputs.git_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare_dev_release.outputs.git_tag }}
          body_path: DEV_RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            release-artifacts/${{ needs.prepare_dev_release.outputs.basename }}.tar.gz
            release-artifacts/${{ needs.prepare_dev_release.outputs.basename }}.zip
